<!DOCTYPE html>
<html lang="en" data-theme="dark-clinical">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Roboto Condensed',sans-serif;
background:#080c16;
color:#c0d4f0;
margin:0
}

header{
background:#0d1528;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10
}

.logo{
font-family:'Orbitron';
font-size:18px;
color:#00e5ff
}

.cart-btn{
background:#00e5ff;
color:#000;
border:none;
padding:8px 16px;
cursor:pointer;
border-radius:4px
}

.wrap{
padding:20px;
max-width:1400px;
margin:auto
}

.toolbar{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap
}

input,select{
padding:10px;
border-radius:4px;
border:1px solid #1a2a50;
background:#121d35;
color:#c0d4f0
}

.tabs{
display:flex;
gap:8px;
margin-bottom:15px
}

.tab{
padding:8px 16px;
border:1px solid #223368;
cursor:pointer;
background:#121d35;
color:#c0d4f0
}

.tab.on{
background:#00e5ff;
color:#000
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:14px
}

.card{
background:#0d1528;
border:1px solid #1a2a50;
padding:14px;
border-radius:6px;
display:flex;
flex-direction:column
}

.med-name{
font-weight:700;
font-size:14px
}

.med-co{
font-size:11px;
color:#5a80b0
}

.d-row{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:4px
}

.badges{
margin-top:6px;
display:flex;
gap:6px
}

.badge{
font-size:10px;
padding:3px 6px;
border-radius:3px
}

.sg{background:#003f2f;color:#00e070}
.sm{background:#3f3300;color:#ffbb00}
.sl{background:#3f0000;color:#ff3355}

.qty-ctrl{
display:flex;
margin-top:8px
}

.qty-ctrl button{
flex:1;
border:none;
background:#1a2a50;
color:white;
font-size:18px;
cursor:pointer
}

.qty-num{
flex:1;
text-align:center;
font-weight:700
}

.pager{
display:flex;
justify-content:center;
margin-top:20px;
gap:6px
}

.pager button{
padding:6px 10px;
border:none;
background:#1a2a50;
color:white;
cursor:pointer
}

.pager .ap{
background:#00e5ff;
color:black
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none
}

.drawer{
position:fixed;
right:-400px;
top:0;
width:360px;
height:100%;
background:#0d1528;
transition:0.3s;
padding:20px;
overflow:auto
}

.drawer.open{
right:0
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center
}

.m-box{
background:#121d35;
padding:20px;
width:340px
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#121d35;
padding:10px 18px;
display:none
}

</style>
</head>

<body>

<header>
<div class="logo">💊 Aaradhya Pharmaceuticals</div>
<button class="cart-btn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<div class="wrap">

<div class="toolbar">

<input id="search" placeholder="Search medicine">

<select id="coFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="tabs">
<button class="tab on" onclick="setView('all')" id="btn-all">All</button>
<button class="tab" onclick="setView('low')" id="btn-low">Low Stock</button>
<button class="tab" onclick="setView('expiry')" id="btn-expiry">Expiry Risk</button>
</div>

<div class="grid" id="grid"></div>

<div class="pager" id="pager"></div>

</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="drawer" id="drawer">
<h3>Cart</h3>
<div id="dBody"></div>
<div>Total ₹<span id="cartTotal">0</span></div>
<button onclick="openReview()">Place Order</button>
</div>

<div class="modal" id="modal">
<div class="m-box">
<h3>Confirm Order</h3>

<div id="rList"></div>

<input id="shopName" placeholder="Shop name">
<input id="phoneNum" placeholder="Phone number">

<button onclick="confirmOrder()">Confirm</button>
<button onclick="closeReview()">Cancel</button>

</div>
</div>

<div class="toast" id="toast"></div>

<script>

const SHEET="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"
const API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let page=1
let perPage=12
let view="all"

fetch(SHEET).then(r=>r.text()).then(csv=>{
rows=csv.split("\n").slice(1).map(r=>r.split(",")).filter(r=>r[1])
initCompanies()
render()
})

function initCompanies(){
let sel=document.getElementById("coFilter")
let companies=[...new Set(rows.map(r=>r[0]).filter(Boolean))]
companies.forEach(c=>{
let o=document.createElement("option")
o.value=c
o.textContent=c
sel.appendChild(o)
})
}

document.getElementById("search").addEventListener("input",()=>{page=1;render()})
document.getElementById("coFilter").addEventListener("change",()=>{page=1;render()})

function setView(v){
view=v
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"))
document.getElementById("btn-"+v).classList.add("on")
render()
}

function getFiltered(){

let q=document.getElementById("search").value.toLowerCase()
let co=document.getElementById("coFilter").value

return rows.filter(r=>{

let name=r[1].toLowerCase()
let stock=parseInt(r[5])||0
let exp=new Date(r[4])

if(!name.includes(q)) return false
if(co && r[0]!=co) return false

if(view=="low") return stock<10
if(view=="expiry"){
let d=(exp-Date.now())/86400000
return d<90 && d>0
}

return true

})

}

function render(){

let data=getFiltered()

let start=(page-1)*perPage
let items=data.slice(start,start+perPage)

let html=""

items.forEach(r=>{

let name=r[1]
let company=r[0]
let batch=r[2]
let expiry=r[4]
let stock=parseInt(r[5])||0
let rate=parseFloat(r[6])||0
let mrp=parseFloat(r[3])||0

let margin=((mrp-rate)/mrp)*100

let sc=stock<=0?"sl":stock<25?"sm":"sg"

let qty=cart[name]?.qty||0

html+=`
<div class="card">

<div class="med-name">${name}</div>
<div class="med-co">${company}</div>

<div class="d-row"><span>MRP</span><span>₹${mrp.toFixed(2)}</span></div>
<div class="d-row"><span>Batch</span><span>${batch}</span></div>
<div class="d-row"><span>Expiry</span><span>${expiry}</span></div>

<div class="badges">
<span class="badge ${sc}">Stock ${stock}</span>
<span class="badge">Margin ${margin.toFixed(1)}%</span>
</div>

<div class="qty-ctrl">

<button onclick="add('${name}',${rate},-1,${stock})">-</button>
<div class="qty-num" id="qty-${name}">${qty}</div>
<button onclick="add('${name}',${rate},1,${stock})">+</button>

</div>

</div>
`

})

document.getElementById("grid").innerHTML=html

renderPager(data.length)

}

function renderPager(total){

let pages=Math.ceil(total/perPage)

let html=""

if(page>1) html+=`<button onclick="goPage(${page-1})">◀</button>`

for(let i=1;i<=Math.min(5,pages);i++){

html+=`<button class="${i==page?'ap':''}" onclick="goPage(${i})">${i}</button>`

}

if(page<pages) html+=`<button onclick="goPage(${page+1})">▶</button>`

document.getElementById("pager").innerHTML=html

}

function goPage(p){
page=p
render()
}

function add(name,rate,change,stock){

if(stock<=0){
toast("Out of stock")
return
}

if(!cart[name]) cart[name]={qty:0,rate}

cart[name].qty=Math.max(cart[name].qty+change,0)

syncCart()

document.getElementById("qty-"+name).textContent=cart[name].qty

}

function syncCart(){

let count=0
let total=0
let html=""

for(let n in cart){

if(cart[n].qty<1) continue

count+=cart[n].qty

let line=cart[n].qty*cart[n].rate

total+=line

html+=`<div>${n} × ${cart[n].qty}</div>`

}

document.getElementById("dBody").innerHTML=html
document.getElementById("cartCount").textContent=count
document.getElementById("cartTotal").textContent=total.toFixed(2)

}

function toggleCart(){

document.getElementById("drawer").classList.toggle("open")
document.getElementById("overlay").style.display="block"

}

function openReview(){

let html=""

for(let n in cart){
if(cart[n].qty>0){
html+=`<div>${n} × ${cart[n].qty}</div>`
}
}

document.getElementById("rList").innerHTML=html

document.getElementById("modal").style.display="flex"

}

function closeReview(){
document.getElementById("modal").style.display="none"
}

function confirmOrder(){

let shop=document.getElementById("shopName").value
let phone=document.getElementById("phoneNum").value

let items=[]
let total=0

for(let n in cart){

let line=cart[n].qty*cart[n].rate
total+=line

items.push({
name:n,
qty:cart[n].qty,
rate:cart[n].rate,
total:line
})

}

fetch(API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({shop,mobile:phone,total,items})
})

cart={}
syncCart()
closeReview()

toast("Order placed successfully")

}

function toast(msg){

let t=document.getElementById("toast")

t.textContent=msg
t.style.display="block"

setTimeout(()=>t.style.display="none",3000)

}

</script>

</body>
</html>
